<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: site.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand">
          <a href="{{ '/' | relative_url }}"><img src="{{ '/assets/images/33-Room-Logo-Files-03.png' | relative_url }}" alt="{{ site.title }} logo" /></a>
        </div>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/table-menu' | relative_url }}">Menu</a>
          <a href="{{ '/visit-the-room' | relative_url }}">Visit the Room</a>
          <a href="{{ '/about' | relative_url }}">About</a>
          <a href="{{ '/history' | relative_url }}">History</a>
          <a href="{{ '/events' | relative_url }}">Happenings</a>
          <a href="{{ '/reserve-the-room' | relative_url }}">Reserve the Room</a>
          <a href="{{ '/contact-us' | relative_url }}">Contact</a>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="footer-grid">
          <div>
            <h2>Location</h2>
            <p>4541 N. Prospect, Suite 33<br />Peoria Heights, Illinois</p>
          </div>
          <div>
            <h2>Contact</h2>
            <p><a href="mailto:the33room@gmail.com">the33room@gmail.com</a><br /><a href="{{ '/contact-us' | relative_url }}">Get in Touch</a></p>
          </div>
          <div>
            <h2>Follow</h2>
            <p><a href="https://www.instagram.com/the33room/">Instagram</a><br /><a href="https://www.facebook.com/The33Room/">Facebook</a></p>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
